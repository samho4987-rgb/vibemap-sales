<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브 프롭테크 솔루션 — 내 정보 수정</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-light">
  <nav class="navbar"><div class="container nav-container"><a href="index.html" class="nav-logo">VIBE <span>PropTech</span></a></div></nav>
  <div class="container mypage-wrapper">
    <aside class="mypage-sidebar">
      <div class="profile-box">
        <div class="avatar">홍</div>
        <div class="profile-info"><strong>홍길동 소장님</strong><span>hong@example.com</span></div>
      </div>
      <ul class="mypage-menu">
        <li><a href="mypage.html">🎁 구독 및 라이선스 관리</a></li>
        <li><a href="profile.html" class="active">⚙️ 내 정보 수정</a></li>
      </ul>
      <div class="mypage-logout"><a href="index.html">로그아웃</a></div>
    </aside>
    <main class="mypage-content">
      <h2 class="mypage-title">개인정보 및 설정</h2>
      <div class="mypage-card">
        <h3 class="profile-section-title">프로필 설정</h3>
        <div class="profile-avatar-zone">
          <div class="avatar large-avatar">홍</div>
          <div class="avatar-action-buttons"><button class="btn-outline btn-sm">사진 변경</button></div>
        </div>
        <form style="margin-top: 32px;" onsubmit="event.preventDefault(); alert('저장되었습니다.');">
          <div class="form-row">
            <div class="field"><label>성함</label><input type="text" value="홍길동" required></div>
            <div class="field"><label>전화번호</label><input type="tel" value="010-1234-5678" required></div>
          </div>
          <div class="field"><label>이메일</label><input type="email" value="hong@example.com" required></div>
          <button type="submit" class="btn-primary" style="margin-top: 12px; padding: 12px 24px;">변경사항 저장</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
