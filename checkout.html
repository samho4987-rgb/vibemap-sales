<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브 프롭테크 솔루션 — 입금 안내</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-light">
  <nav class="navbar"><div class="container nav-container"><a href="index.html" class="nav-logo">VIBE <span>PropTech</span></a></div></nav>
  <div class="container checkout-wrapper">
    <div class="checkout-grid" id="checkout-summary">
      <div class="checkout-left">
        <h2 class="checkout-title">입금 안내</h2>
        <p class="text-muted" style="margin-bottom: 24px;">신청이 접수되었습니다. 아래 계좌로 입금해 주시면 확인 후 라이선스를 발급해 드립니다.</p>

        <div class="field">
          <label>입금 계좌</label>
          <div id="checkout-bank" class="bank-info-box">-</div>
        </div>

        <div class="field"><label for="depositorName">입금자명</label><input type="text" id="depositorName" placeholder="입금하실 성함"></div>
        <div class="field"><label for="contactPhone">연락처</label><input type="tel" id="contactPhone" placeholder="010-0000-0000"></div>

        <p class="summary-notice" style="margin-top: 24px;">
          입금 확인은 영업일 기준 순차적으로 진행되며, 완료 시 등록하신 연락처로 안내드립니다.<br>
          신청 시 입력하신 정보와 입금자명이 다를 경우 확인이 늦어질 수 있습니다.
        </p>
      </div>
      <div class="checkout-right">
        <h2 class="checkout-title">신청 내역</h2>
        <div class="summary-item-box">
          <div class="summary-item">
            <div class="summary-info"><h4 id="checkout-product-name">-</h4><p>월간 구독</p></div>
            <div class="summary-price" id="checkout-product-price">-</div>
          </div>
        </div>
        <p class="summary-notice">문의: info@example.com</p>
      </div>
    </div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
