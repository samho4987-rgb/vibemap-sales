<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브 프롭테크 솔루션 — 로그인</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-light login-body">
  <div class="login-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>로그인</h2>
      </div>
      <div class="auth-card-body">
        <form id="loginForm">
          <div class="field"><label for="email">이메일</label><input type="email" id="email" required placeholder="이메일을 입력하세요"></div>
          <div class="field"><label for="password">비밀번호</label><input type="password" id="password" required placeholder="비밀번호를 입력하세요"></div>

          <p id="loginMessage" class="form-message" role="status"></p>

          <button type="submit" id="loginBtn" class="btn-submit" style="margin-top: 8px;">로그인</button>
        </form>

        <div class="auth-divider"><span>또는</span></div>

        <button type="button" id="kakaoLoginBtn" class="btn-kakao">
          <span class="kakao-icon">💬</span> 카카오로 로그인
        </button>

        <div class="login-footer-links">
          <span>아직 계정이 없으신가요?</span> <a href="signup.html">회원가입</a>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
