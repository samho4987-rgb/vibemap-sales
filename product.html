<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브 프롭테크 솔루션 — 상품 상세</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-logo">VIBE <span>PropTech</span></a>
      <a href="login.html" id="navAuthLink" class="btn-nav" style="border:none; color:var(--muted); margin-right:-16px;">로그인</a>
    </div>
  </nav>

  <main class="container" style="max-width: 760px; padding-top: 48px; padding-bottom: 80px;">
    <div id="product-detail">
      <p class="loading">불러오는 중입니다...</p>
    </div>
  </main>

  <!-- 구매 모달 -->
  <div id="purchaseModalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="purchaseModalTitle">프로그램 구매</h2>
        <button type="button" id="purchaseModalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-summary">
          <h3 id="purchaseProductName">-</h3>
          <div class="modal-summary-row"><span>이용 기간</span><span id="purchasePeriod">-</span></div>
          <div class="modal-summary-row"><span>결제 금액</span><strong id="purchasePrice">-</strong></div>
        </div>

        <form id="purchaseForm">
          <div class="field">
            <label for="purchaseName">입금자명 *</label>
            <input type="text" id="purchaseName" required placeholder="실제 입금하실 때 사용할 이름을 입력해주세요">
          </div>
          <div class="field">
            <label for="purchasePhone">연락처 *</label>
            <input type="tel" id="purchasePhone" required placeholder="010-1234-5678">
            <span class="field-hint">입금 확인 및 프로그램 안내를 위해 필요합니다.</span>
          </div>

          <div class="bank-notice-box">
            <h4>🏦 무통장 입금 안내</h4>
            <div class="modal-summary-row"><span>은행명</span><span id="purchaseBankName">-</span></div>
            <div class="modal-summary-row"><span>계좌번호</span><strong id="purchaseBankAccount">-</strong></div>
            <div class="modal-summary-row"><span>예금주</span><span id="purchaseBankHolder">-</span></div>
            <p class="bank-notice-text">입금 확인은 영업일 기준 순차적으로 진행되며, 완료 시 등록하신 연락처로 안내드립니다.</p>
          </div>

          <p id="purchaseMessage" class="form-message" role="status"></p>

          <div class="modal-actions">
            <button type="button" id="purchaseCancelBtn" class="btn-outline-accent">취소</button>
            <button type="submit" id="purchaseSubmitBtn" class="btn-submit">구매하기</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="siteFooter"></footer>
  <script src="assets/app.js"></script>
</body>
</html>
