<!DOCTYPE html>

<body class="bg-light">
  <nav class="navbar"><div class="container nav-container"><a href="index.html" class="nav-logo">VIBE <span>PropTech</span></a></div></nav>

    <aside class="mypage-sidebar">

      <ul class="mypage-menu">
        <li><a href="mypage.html" class="active">🎁 구독 및 라이선스 관리</a></li>
        <li><a href="profile.html">⚙️ 내 정보 수정</a></li>

    <main class="mypage-content">
      <h2 class="mypage-title">구독 및 라이선스 관리</h2>

        <div class="license-input-group">
          <input type="text" id="licenseKey" value="VIBE-PRO-8A9X-2C4M-11PQ" readonly>
          <button class="btn-primary" onclick="const t = document.getElementById('licenseKey'); t.select(); navigator.clipboard.writeText(t.value); alert('복사되었습니다!');">복사하기</button>
