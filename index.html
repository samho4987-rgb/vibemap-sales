<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>중개사 매물 도구 · 신청하기</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">중개사 매물 도구</div>
    <a class="nav-link" href="#apply-form">신청하기</a>
  </header>

  <main>
    <section class="hero">
      <h1>매물 관리, 지도 뷰어, 자동 수집까지</h1>
      <p>계좌이체로 간편하게 신청하고, 확인 후 바로 이용하실 수 있습니다.</p>
    </section>

    <section class="products">
      <div id="product-grid" class="product-grid">
        <p class="loading">상품 목록을 불러오는 중입니다...</p>
      </div>
    </section>

    <section id="apply-form" class="apply-section">
      <h2>신청하기</h2>
      <form id="applyForm" novalidate>
        <div class="field">
          <label for="product">신청 상품</label>
          <select id="product" name="product" required></select>
        </div>
        <div class="field">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="phone">휴대폰 번호</label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
        </div>
        <div class="field">
          <label for="email">이메일 (선택)</label>
          <input type="email" id="email" name="email">
        </div>
        <div class="field">
          <label for="memo">문의 내용 (선택)</label>
          <textarea id="memo" name="memo" rows="3"></textarea>
        </div>
        <button type="submit" id="submitBtn">신청하기</button>
        <p id="formMessage" class="form-message" role="status"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>신청 후 계좌 안내는 순차적으로 연락드립니다.</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
